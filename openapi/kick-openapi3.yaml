servers:
  - url: https://api.kick.com
components:
  securitySchemes:
    AppAccessToken:
      description: App Access Token for the KICK Developer Public API. Uses the OAuth
        2.0 Client Credentials Grant Flow.
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://id.kick.com/oauth/token
          scopes: {}
    UserAccessToken:
      description: User Access Token for the KICK Developer Public API. Uses the OAuth
        2.0 Authorization Code Grant Flow (with PKCE).
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://id.kick.com/oauth/authorize
          tokenUrl: https://id.kick.com/oauth/token
          scopes:
            channel:read: View channel information in Kick including channel description,
              category, etc.
            channel:rewards:read: Read Channel points rewards information on a channel
            channel:rewards:write: Read, add, edit and delete Channel points rewards on a channel
            channel:write: Update livestream metadata for a channel based on the channel ID
            chat:write: Send chat messages and allow chat bots to post in your chat
            events:subscribe: Subscribe to all channel events on Kick e.g. chat messages,
              follows, subscriptions
            kicks:read: View KICKs related information in Kick e.g leaderboards, etc.
            moderation:ban: Execute moderation actions for moderators
            moderation:chat_message:manage: Execute moderation actions on chat messages
            streamkey:read: Read a user's stream URL and stream key
            user:read: View user information in Kick including username, streamer ID, etc.
  schemas:
    endpoints.AcceptChannelRewardRedemptionsParams:
      properties:
        ids:
          description: List of redemption IDs to accept. A maximum of 25 redemptions can
            be accepted per request. IDs must be unique.
          example:
            - 01KEWZ2RKYZZFGD154K50Y3F8D
            - 01KEWZ2YC27070XWMHKFJR6C87
          items:
            format: ulid
            type: string
          maxItems: 25
          minItems: 1
          type: array
          uniqueItems: true
      required:
        - ids
      type: object
    endpoints.CategoryDetail:
      properties:
        id:
          example: 101
          type: integer
        name:
          example: Old School Runescape
          type: string
        tags:
          example:
            - pog
            - chad
          items:
            type: string
          type: array
        thumbnail:
          example: https://kick.com/img/categories/old-school-runescape.jpeg
          type: string
        viewer_count:
          example: 1000
          type: integer
      type: object
    endpoints.CategoryResponse:
      properties:
        id:
          example: 101
          type: integer
        name:
          example: Old School Runescape
          type: string
        thumbnail:
          example: https://kick.com/img/categories/old-school-runescape.jpeg
          type: string
      type: object
    endpoints.CategoryWithTags:
      properties:
        id:
          example: 101
          type: integer
        name:
          example: Rust
          type: string
        tags:
          example:
            - FPS
            - Shooter
            - Adventure
          items:
            type: string
          type: array
        thumbnail:
          example: https://kick.com/img/categories/rust.jpeg
          type: string
      type: object
    endpoints.ChannelReward:
      properties:
        background_color:
          example: "#00e701"
          format: hexcolor
          type: string
        cost:
          example: 100
          type: integer
        description:
          example: Request a song by providing a URL
          type: string
        id:
          example: 01HZ8X9K2M4N6P8Q0R2S4T6V8W0Y2Z4
          format: ulid
          type: string
        is_enabled:
          example: true
          type: boolean
        is_paused:
          example: false
          type: boolean
        is_user_input_required:
          example: false
          type: boolean
        should_redemptions_skip_request_queue:
          example: false
          type: boolean
        title:
          example: Song Request
          type: string
      type: object
    endpoints.ChannelRewardRedemption:
      properties:
        id:
          example: 01KCTMJ2X3DXT814CVX8FR9T1D
          format: ulid
          type: string
        redeemed_at:
          example: 2025-12-19T06:26:36Z
          format: date-time
          type: string
        redeemer:
          $ref: "#/components/schemas/endpoints.UserInfo"
        status:
          enum:
            - pending
            - accepted
            - rejected
