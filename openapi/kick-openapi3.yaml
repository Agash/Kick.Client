openapi: 3.0.0
info:
  contact:
    email: support@kick.com
    name: Kick Support
    url: https://help.kick.com/en/
  description: Kick Developer Public API
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: Kick Dev Public API
  version: 1.0.0
paths:
  /oauth/authorize:
    post:
      description: >-
        Authorize endpoint for the OAuth 2.1 flow. OAuth endpoint is
        https://id.kick.com.

        The state is a random string that is generated by the client and is used to prevent CSRF attacks

        In this handler we are required to store all of these parameters that have been parsed and attach them to the request

        object for use by the oauth2 server.


        Once successful this endpoint will redirect the user to the redirect_uri with the

        code and state in the query string following this format:


        https://www.redirect-uri.com/callback

        ?state=G8VdYFIzdbIVhaz8

        &code=KrPx-1uqXmq6haTWG8I8F1VMutnA6AQANY-fB9aBa-j1nXCH.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                response_type:
                  description: code
                  type: string
                client_id:
                  description: 88STyxwAAtoENitgyo19l000
                  type: string
                redirect_uri:
                  description: https://www.client-app.com/oauth/callback
                  type: string
                scope:
                  description: chat:read channel:read
                  type: string
                state:
                  description: random_value
                  type: string
                code_challenge:
                  description: Qn3Kywp0OiU4NK_AFzGPlmrcYJDJ13Abj_jdL08Ahg8%3D
                  type: string
                code_challenge_method:
                  description: S256
                  type: string
              required:
                - response_type
                - client_id
                - redirect_uri
                - scope
                - state
                - code_challenge
                - code_challenge_method
        required: true
      responses:
        "302":
          description: Found
        "500":
          description: Internal Server Error
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: "#/components/schemas/endpoints.HTTPError"
      summary: Authorize endpoint
      tags:
        - oauth
  /oauth/revoke:
    post:
      description: This endpoint will revoke access for a token.
      parameters:
        - description: token value
          in: query
          name: token
          required: true
          schema:
            type: string
        - description: access_token, refresh_token
          in: query
          name: token_type_hint
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string
      summary: OAuth Revoke
      tags:
        - oauth
  /oauth/token:
    post:
      description: >-
        Authorize endpoint for the OAuth 2.1 flow. OAuth endpoint is
        https://id.kick.com.

        POST https://id.kick.com/oauth/token

        ?grant_type=authorization_code

        &client_id=88STyxwAAtoENitgyo19l25v

        &client_secret=dD0vE4xQNtNubyDwk45UXNFhftyrIrTWpqpAw_ZL71L--A0W

        &code=KrPx-1uqXmq6haTWG8I8F1VMutnA6AQANY-fB9aBa-j1nXCH


        Or refreshing a token


        POST https://id.kick.com/oauth/token

        ?grant_type=refresh_token

        &client_id=88STyxwAAtoENitgyo19l25v

        &client_secret=dD0vE4xQNtNubyDwk45UXNFhftyrIrTWpqpAw_ZL71L--A0W

        &redirect_uri=https://www.client-app.com/oauth/callback

        &refresh_token=KrPx-1uqXmq6haTWG8I8F1VMutnA6AQANY-fB9aBa-j1nXCH


        The response here will be a json object with the access_token, token_type, expires_in, refresh_token, and scope


        {

        "access_token": "2YotnFZFEjr1zCsicMWpAA",

        "token_type": "Bearer",

        "expires_in": 3600,

        "refresh_token": "tGzv3JOkF0XG5Qx2TlKWIA",

        }


        The code parsed here is the code that was generated by the /authorize endpoint redirect

        The client will need to parse the client_secret in this request to identify they are owner of the client

        as a result of this we can omit the state parameter as it's purpose has been served in the /authorize endpoint

        The response will be a json object with the access_token, token_type, expires_in, refresh_token, and scope


        This endpoint can also be used to refresh the token, the majoirty of this flow can be skipped when refreshing, and all that will need to be done is

        the same request with the grant_type=refresh_token and the refresh_token parameter.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  description: client_credentials,authorization_code,refresh_token
                  type: string
                client_id:
                  description: 88STyxwAAtoENitgyo19l000
                  type: string
                client_secret:
                  description: dD0vE4xQNtNubyDwk45UXNFhftyrIrTWpqpAw_ZL71L--A0W
                  type: string
                code:
                  description: KrPx-1uqXmq6haTWG8I8F1VMutnA6AQANY-fB9aBa-j1nXCH
                  type: string
                redirect_uri:
                  description: https://www.client-app.com/oauth/callback
                  type: string
                refresh_token:
                  description: KrPx-1uqXmq6haTWG8I8F1VMutnA6AQANY-fB9aBa-j1nXCH
                  type: string
              required:
                - grant_type
                - client_id
                - client_secret
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: string
      summary: Refresh Token endpoint
      tags:
        - oauth
  /oauth/token/introspect:
    post:
      description: >-
        Get information about the token that is passed in via the Authorization
        header.

        This function is implements part of the on the OAuth 2.0 spec for token introspection. Find the full spec here: https://datatracker.ietf.org/doc/html/rfc7662

        When active=false there is no additional information added in the response.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/httpx.Response"
                  - properties:
                      data:
                        $ref: "#/components/schemas/endpoints.PostTokenIntrospectResponse"
                    type: object
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
      security:
        - UserAccessToken: []
        - AppAccessToken: []
      summary: Token Introspect
      tags:
        - oauth
  /public/v1/categories:
    get:
      deprecated: true
      description: Get Categories based on the search word. Returns up to 100 results
        at a time; use the `page` parameter to get more results.
      parameters:
        - description: Search query
          in: query
          name: q
          required: true
          schema:
            type: string
        - description: Page (defaults to 1 if not provided)
          in: query
          name: page
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/httpx.Response"
                  - properties:
                      data:
                        items:
                          $ref: "#/components/schemas/endpoints.CategoryResponse"
                        type: array
                    type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
      security:
        - UserAccessToken: []
        - AppAccessToken: []
      summary: Get Categories
      tags:
        - categories
  "/public/v1/categories/{category_id}":
    get:
      deprecated: true
      description: Get Category based on the id.
      parameters:
        - description: Category ID
          in: path
          name: category_id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/httpx.Response"
                  - properties:
                      data:
                        $ref: "#/components/schemas/endpoints.CategoryDetail"
                    type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
      security:
        - UserAccessToken: []
        - AppAccessToken: []
      summary: Get Category
      tags:
        - categories
  /public/v1/channels:
    get:
      description: >-
        Retrieve channel information based on provided broadcaster user IDs or
        channel slugs.

        You can either:

        1. Provide no parameters (returns information for the currently authenticated user)

        2. Provide only broadcaster_user_id parameters (up to 50)

        3. Provide only slug parameters (up to 50, each max 25 characters)

        Note: You cannot mix broadcaster_user_id and slug parameters in the same request.
      parameters:
        - description: Broadcaster User IDs (cannot be used with slug)
          in: query
          name: broadcaster_user_id
          explode: true
          schema:
            type: array
            items:
              format: int64
              type: integer
        - description: Channel slugs (cannot be used with broadcaster_user_id)
          in: query
          name: slug
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/httpx.Response"
                  - properties:
                      data:
                        items:
                          $ref: "#/components/schemas/endpoints.GetChannel"
                        type: array
                    type: object
        "400":
          description: Invalid parameters or mixed parameter types
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
      security:
        - UserAccessToken:
            - channel:read
        - AppAccessToken: []
      summary: Get Channels
      tags:
        - channels
    patch:
      description: Updates livestream metadata for a channel.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/endpoints.PatchChannelsParams"
        description: at least one must be set
        required: true
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
      security:
        - UserAccessToken:
            - channel:write
      summary: Patch Channels
      tags:
        - channels
  /public/v1/channels/rewards:
    get:
      description: >-
        Get channel rewards for a broadcaster's channel.

        Channels may have up to 15 rewards, including both enabled and disabled rewards.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/httpx.Response"
                  - properties:
                      data:
                        items:
                          $ref: "#/components/schemas/endpoints.ChannelReward"
                        type: array
                    type: object
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
      security:
        - UserAccessToken:
            - channel:rewards:read
        - UserAccessToken:
            - channel:rewards:write
      summary: Get Channel Rewards
      tags:
        - channel-rewards
    post:
      description: >-
        Creates a channel reward in the broadcaster's channel.

        A maximum of 15 rewards can be created, including both enabled and disabled rewards.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/endpoints.PostChannelRewardsBody"
        description: Request body containing the reward to create
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/httpx.Response"
                  - properties:
                      data:
                        $ref: "#/components/schemas/endpoints.ChannelReward"
                    type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
      security:
        - UserAccessToken:
            - channel:rewards:write
      summary: Create Channel Reward
      tags:
        - channel-rewards
  "/public/v1/channels/rewards/{id}":
    delete:
      description: |-
        Deletes a channel reward in the broadcaster's channel.
        Note that only the app that created the reward can delete it.
      parameters:
        - description: Reward ID
          in: path
          name: id
          required: true
          schema:
            type: string
            format: ulid
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "401":
          description: Unauthorized
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "403":
          description: Forbidden
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "500":
          description: Internal Server Error
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/httpx.Response"
      security:
        - UserAccessToken:
            - channel:rewards:write
      summary: Delete Channel Reward
      tags:
        - channel-rewards
    patch:
      description: |-
        Updates a channel reward in the broadcaster's channel.
        Note that only the app that created the reward can update it.
      parameters:
        - description: Reward ID
          in: path
          name: id
          required: true
          schema:
            type: string
            format: ulid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/endpoints.PatchChannelRewardsBody"
        description: Request body containing only the fields to update. There must be at
          least one field defined.
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/httpx.Response"
                  - properties:
                      data:
                        $ref: "#/components/schemas/endpoints.ChannelReward"
                    type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
      security:
        - UserAccessToken:
            - channel:rewards:write
      summary: Update Channel Reward
      tags:
        - channel-rewards
  /public/v1/channels/rewards/redemptions:
    get:
      description: |
        Get channel reward redemptions for a broadcaster's channel.
      parameters:
        - description: Optionally provide a reward ID to list redemptions for that
            specific reward.
          in: query
          name: reward_id
          schema:
            type: string
            format: ulid
        - description: Optionally provide a specific status to filter by. Defaults to
            pending.
          in: query
          name: status
          schema:
            type: string
            enum:
              - pending
              - accepted
              - rejected
        - description: Optionally provide a list of redemption IDs to filter by. You
            cannot provide any other filters if you filter by redemption IDs.
          in: query
          name: id
          explode: true
          schema:
            type: array
            items:
              type: string
            format: ulid
        - description: Optionally provide a cursor to paginate through the results.
          in: query
          name: cursor
          schema:
            type: string
            format: base64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/endpoints.PaginatedResponse-endpoints_RedemptionsBy\
                  Reward"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/endpoints.SwagPaginatedErrResp"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/endpoints.SwagPaginatedErrResp"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/endpoints.SwagPaginatedErrResp"
      security:
        - UserAccessToken:
            - channel:rewards:read
        - UserAccessToken:
            - channel:rewards:write
      summary: Get Channel Reward Redemptions
      tags:
        - channel-rewards
  /public/v1/channels/rewards/redemptions/accept:
    post:
      description: >-
        Accept channel reward redemptions for a broadcaster's channel.

        The response will only include data for redemptions that failed to be accepted.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/endpoints.AcceptChannelRewardRedemptionsParams"
        description: Request body
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/httpx.Response"
                  - properties:
                      data:
                        items:
                          $ref: "#/components/schemas/endpoints.FailedRedemption"
                        type: array
                    type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
      security:
        - UserAccessToken:
            - channel:rewards:write
      summary: Accept Channel Reward Redemptions
      tags:
        - channel-rewards
  /public/v1/channels/rewards/redemptions/reject:
    post:
      description: >-
        Reject channel reward redemptions for a broadcaster's channel.

        The response will only include data for redemptions that failed to be rejected.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/endpoints.RejectChannelRewardRedemptionsParams"
        description: Request body
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/httpx.Response"
                  - properties:
                      data:
                        items:
                          $ref: "#/components/schemas/endpoints.FailedRedemption"
                        type: array
                    type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
      security:
        - UserAccessToken:
            - channel:rewards:write
      summary: Reject Channel Reward Redemptions
      tags:
        - channel-rewards
  /public/v1/chat:
    post:
      description: >-
        Post a chat message to a channel as a user or a bot.

        When sending as a user, the broadcaster_user_id is required. Whereas when sending as a bot, the broadcaster_user_id is not required and is ignored. As a bot, the message will always be sent to the channel attached to your token.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/endpoints.PostChatParams"
        description: Chat message parameters
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/httpx.Response"
                  - properties:
                      data:
                        $ref: "#/components/schemas/endpoints.ChatResp"
                    type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "429":
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/endpoints.ErrorResponse"
      security:
        - UserAccessToken:
            - chat:write
      summary: Post Chat Message
      tags:
        - chat
  "/public/v1/chat/{message_id}":
    delete:
      description: Delete a chat message from a channel.
      parameters:
        - description: Message ID
          in: path
          name: message_id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "401":
          description: Unauthorized
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "403":
          description: Forbidden
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/httpx.Response"
        "404":
